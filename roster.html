<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster | Silk Ivory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Founders+Grotesk+X-Condensed:wght@600&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; color: #000; font-family: 'DM Mono', monospace; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* NAV */
        nav { display: flex; justify-content: space-between; padding: 30px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .logo { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 1.5rem; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-links a { color: #000; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; margin-left: 25px; letter-spacing: 0.1em; }

        header { padding: 80px 5% 40px; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: clamp(4rem, 10vw, 8rem); text-transform: uppercase; line-height: 0.85; letter-spacing: -0.04em; }

        /* ROSTER GRID */
        .roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid #eee; background: #fff; }
        .artist-card { position: relative; aspect-ratio: 4/5; overflow: hidden; border-right: 1px solid #eee; cursor: pointer; background: #000; }
        .artist-card:last-child { border-right: none; }
        
        /* IMAGES */
        .artist-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1); opacity: 0.85; display: block; }
        .artist-card:hover img { transform: scale(1.05); filter: grayscale(0%); opacity: 1; }

        /* OVERLAY (NAME ON HOVER) */
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 60%); 
            display: flex; 
            align-items: flex-end; 
            padding: 30px; 
            opacity: 0; 
            transition: opacity 0.4s ease; 
            z-index: 10; 
        }
        .artist-card:hover .overlay { opacity: 1; }
        .overlay h2 { color: #ffffff !important; font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 4rem; text-transform: uppercase; line-height: 0.85; pointer-events: none; }

        /* MOBILE LABELS */
        .mobile-label { display: none; padding: 20px 5%; font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 2rem; text-transform: uppercase; border-bottom: 1px solid #eee; background: #fff; }

        /* DRAWER */
        .drawer { position: fixed; top: 0; right: -100%; width: 500px; height: 100%; background: #fff; z-index: 2000; box-shadow: -10px 0 50px rgba(0,0,0,0.1); transition: right 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); padding: 100px 50px; overflow-y: auto; }
        .drawer.active { right: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: 0.5s; z-index: 1999; backdrop-filter: blur(5px); }
        .drawer-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 3rem; cursor: pointer; }
        
        .drawer h3 { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 5rem; text-transform: uppercase; line-height: 0.85; margin-bottom: 30px; }
        .drawer .spec-label { font-size: 0.65rem; color: #bbb; text-transform: uppercase; letter-spacing: 0.25em; margin-top: 40px; display: block; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .drawer p { font-size: 0.9rem; line-height: 1.6; color: #333; margin-top: 15px; text-transform: uppercase; }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .roster-grid { grid-template-columns: 1fr; }
            .artist-card { border-right: none; aspect-ratio: 1/1; }
            .overlay { display: none; }
            .mobile-label { display: block; }
            .drawer { width: 100%; padding: 80px 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SILK IVORY</a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="roster.html">Roster</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header>
        <h1>The<br>Roster</h1>
    </header>

    <section class="roster-grid">
        <div class="artist-card" onclick="openDrawer('4th')">
            <img src="images/4th.jpg" alt="4th Pyramid">
            <div class="overlay"><h2>4th<br>Pyramid</h2></div>
            <div class="mobile-label">01 / 4th Pyramid</div>
        </div>

        <div class="artist-card" onclick="openDrawer('tommy')">
            <img src="images/tommy.webp" alt="Tommy Newport">
            <div class="overlay"><h2>Tommy<br>Newport</h2></div>
            <div class="mobile-label">02 / Tommy Newport</div>
        </div>

        <div class="artist-card" onclick="openDrawer('mischa')">
            <img src="images/mischa.jpg" alt="Mischa Chillak">
            <div class="overlay"><h2>Mischa<br>Chillak</h2></div>
            <div class="mobile-label">03 / Mischa Chillak</div>
        </div>
    </section>

    <div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="close-btn" onclick="closeDrawer()">×</div>
        <div id="drawer-content"></div>
    </div>

    <script>
        const data = {
            '4th': { name: '4th<br>Pyramid', role: 'Production / Founder', credits: '21 Savage, Wu-Tang Clan, MF DOOM', bio: 'Platinum-certified producer and technical creative director. Lead architect of the Silk Slaps series.' },
            'tommy': { name: 'Tommy<br>Newport', role: 'Management / Artist', credits: 'Apple iPad, COLORS, 100M+ Streams', bio: 'Flagship management client. Global touring artist specializing in alternative-pop production.' },
            'mischa': { name: 'Mischa<br>Chillak', role: 'Development / Strategy', credits: 'Catalog Admin, Strategic Growth', bio: 'Specialist in artist development and strategic catalog administration.' }
        };

        function openDrawer(id) {
            const artist = data[id];
            const content = document.getElementById('drawer-content');
            content.innerHTML = `<h3>${artist.name}</h3><span class="spec-label">Function</span><p>${artist.role}</p><span class="spec-label">Credits</span><p>${artist.credits}</p><span class="spec-label">Profile</span><p>${artist.bio}</p>`;
            document.getElementById('drawer').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
