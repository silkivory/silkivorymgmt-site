    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #ffffff; 
            color: #000; 
            font-family: 'DM Mono', monospace; 
            -webkit-font-smoothing: antialiased; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        nav { display: flex; justify-content: space-between; padding: 25px 5%; position: fixed; width: 100%; top: 0; background: #fff; z-index: 1000; }
        .logo { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 1.25rem; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 0.1em; }
        .nav-links a { color: #000; text-decoration: none; font-size: 0.65rem; text-transform: uppercase; margin-left: 30px; letter-spacing: 0.15em; }

        /* HERO SECTION */
        .hero { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            text-align: center;
            padding: 0 5%; 
        }

        .hero h1 { 
            font-family: 'Founders Grotesk X-Condensed', sans-serif; 
            font-size: clamp(5rem, 18vw, 14rem); 
            line-height: 0.85; 
            text-transform: uppercase; 
            letter-spacing: -0.02em;
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: #000;
        }

        /* STEALTH FOOTER */
        footer {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .location { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.2em; color: #999; }

        .contact-link {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-decoration: none;
            color: #000;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        .contact-link:hover {
            border-color: #000;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 6rem; }
            .tagline { font-size: 0.6rem; letter-spacing: 0.2em; }
        }
    </style>

<body>

    <nav>
        <a href="index.html" class="logo">SILK IVORY</a>
        <div class="nav-links">
            <a href="about.html">About</a>

        </div>

    <main class="hero">

    <footer>
        <span class="location">Los Angeles, CA</span>
        <a href="mailto:4th@silkivorymgmt.com" class="contact-link">Inquiries</a>
    </footer>

</body>
