<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster | Silk Ivory</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Founders+Grotesk+X-Condensed:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; color: #000; font-family: 'DM Mono', monospace; -webkit-font-smoothing: antialiased; }
        
        nav { display: flex; justify-content: space-between; padding: 25px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .logo { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 1.25rem; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 0.1em; }
        .nav-links a { color: #000; text-decoration: none; font-size: 0.65rem; text-transform: uppercase; margin-left: 30px; letter-spacing: 0.15em; }

        .content { padding: 80px 5%; }
        .page-title { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 1.6rem; text-transform: uppercase; margin-bottom: 40px; letter-spacing: 0.01em; }

        /* ROSTER GRID */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .artist-card {
            position: relative;
            overflow: hidden;
            background: #f9f9f9;
            aspect-ratio: 1 / 1;
        }

        .artist-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        /* HOVER EFFECT (DESKTOP ONLY) */
        .artist-info {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .artist-info span {
            font-family: 'Founders Grotesk X-Condensed', sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
        }

        /* Only applies hover if the device supports it (Desktop) */
        @media (hover: hover) {
            .artist-card:hover .artist-info { opacity: 1; }
            .artist-card:hover img { opacity: 0.3; }
        }

        /* MOBILE FIX: SHOW NAMES BELOW PICTURES */
        @media (max-width: 768px) {
            .roster-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
            .artist-card { aspect-ratio: auto; background: none; }
            .artist-info { 
                position: relative; 
                opacity: 1; 
                background: none; 
                justify-content: flex-start; 
                padding: 10px 0;
                height: auto;
            }
            .artist-info span { font-size: 1rem; letter-spacing: 0.05em; }
            .nav-links a { margin-left: 15px; font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SILK IVORY</a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="roster.html">Roster</a>
        </div>
    </nav>
    <main class="content">
        <h1 class="page-title">Roster</h1>
        
        <div class="roster-grid">
            <div class="artist-card">
                <img src="artist1.jpg" alt="Artist Name">
                <div class="artist-info">
                    <span>Artist Name</span>
                </div>
            </div>
            <div class="artist-card">
                <img src="artist2.jpg" alt="Artist Name">
                <div class="artist-info">
                    <span>Artist Name</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
