<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster | Silk Ivory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Founders+Grotesk+X-Condensed:wght@600&display=swap" rel="stylesheet">
    <style>
        /* BASE STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; color: #000; font-family: 'DM Mono', monospace; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* NAVIGATION */
        nav { display: flex; justify-content: space-between; padding: 30px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .logo { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 1.5rem; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-links a { color: #000; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; margin-left: 25px; letter-spacing: 0.1em; }

        header { padding: 80px 5% 40px; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: clamp(4rem, 10vw, 8rem); text-transform: uppercase; line-height: 0.85; letter-spacing: -0.04em; }

        /* ROSTER GRID */
        .roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid #eee; }
        .artist-card { position: relative; aspect-ratio: 4/5; overflow: hidden; border-right: 1px solid #eee; cursor: pointer; background: #000; }
        .artist-card:last-child { border-right: none; }
        .artist-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1), filter 0.8s ease; opacity: 0.85; }
        
        .artist-card:hover img { transform: scale(1.08); filter: grayscale(0%); opacity: 1; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%); display: flex; align-items: flex-end; padding: 30px; opacity: 0; transition: opacity 0.4s ease; }
        .artist-card:hover .overlay { opacity: 1; }
        .overlay h2 { color: #fff; font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 4rem; text-transform: uppercase; line-height: 0.9; }

        .mobile-label { display: none; padding: 20px 5%; font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 2rem; text-transform: uppercase; border-bottom: 1px solid #eee; }

        /* SPEC SHEET DRAWER */
        .drawer { position: fixed; top: 0; right: -100%; width: 500px; height: 100%; background: #fff; z-index: 2000; box-shadow: -10px 0 50px rgba(0,0,0,0.1); transition: right 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); padding: 100px 50px; display: flex; flex-direction: column; overflow-y: auto; }
        .drawer.active { right: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.5s; z-index: 1999; backdrop-filter: blur(5px); }
        .drawer-overlay.active { opacity: 1; visibility: visible; }
        
        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 2.5rem; cursor: pointer; font-weight: 200; }
        .drawer h3 { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 6rem; text-transform: uppercase; line-height: 0.85; margin-bottom: 30px; letter-spacing: -0.02em; }
        .drawer .spec-label { font-size: 0.65rem; color: #bbb; text-transform: uppercase; letter-spacing: 0.25em; margin-top: 40px; display: block; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .drawer p { font-size: 0.85rem; line-height: 1.7; color: #333; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.05em; }

        /* RESPONSIVE BREAKPOINTS */
        @media (max-width: 1024px) {
            .roster-grid { grid-template-columns: 1fr; }
            .artist-card { border-right: none; border-bottom: none; aspect-ratio: 1/1; }
            .overlay { display: none; }
            .mobile-label { display: block; }
            .drawer { width: 100%; padding: 80px 30px; }
            h1 { font-size: 4.5rem; }
            .drawer h3 { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SILK IVORY</a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="roster.html">Roster</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header>
        <h1>The<br>Roster</h1>
    </header>

    <section class="roster-grid">
        <div class="artist-card" onclick="openDrawer('4th')">
            <img src="images/4th.jpg" alt="4th Pyramid">
            <div class="overlay"><h2>4th<br>Pyramid</h2></div>
            <div class="mobile-label">01 / 4th Pyramid</div>
        </div>

        <div class="artist-card" onclick="openDrawer('tommy')">
            <img src="images/tommy.webp" alt="Tommy Newport">
            <div class="overlay"><h2>Tommy<br>Newport</h2></div>
            <div class="mobile-label">02 / Tommy Newport</div>
        </div>
