<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silk Ivory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Founders+Grotesk+X-Condensed:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; color: #000; font-family: 'DM Mono', monospace; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; padding: 25px 5%; position: fixed; width: 100%; top: 0; background: #fff; z-index: 1000; }
        .logo { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 1.25rem; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 0.1em; }
        .nav-links a { color: #000; text-decoration: none; font-size: 0.65rem; text-transform: uppercase; margin-left: 30px; letter-spacing: 0.15em; }

        /* HERO SECTION */
        .hero { 
            height: 90vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 0 5%; 
        }
        .hero h1 { 
            font-family: 'Founders Grotesk X-Condensed', sans-serif; 
            font-size: clamp(4rem, 15vw, 12rem); 
            line-height: 0.9; 
            text-transform: uppercase; 
            letter-spacing: -0.02em;
        }

        /* MOVING BANNER (THE NETWORK) */
        .marquee {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 20px 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-content {
            display: inline-block;
            animation: scroll 40s linear infinite;
        }
        .marquee-content span {
            font-family: 'Founders Grotesk X-Condensed', sans-serif;
            font-size: 1.25rem;
            text-transform: uppercase;
            padding: 0 40px;
            color: #000;
            letter-spacing: 0.1em;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 5rem; }
            .marquee-content span { font-size: 1rem; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">SILK IVORY</a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="roster.html">Roster</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="hero">
        <h1>Silk<br>Ivory</h1>
    </main>

    <div class="marquee">
        <div class="marquee-content">
            <span>Apple</span> <span>Nike</span> <span>HBO</span> <span>NFL</span> <span>Sprite</span> <span>Disney</span> <span>Netflix</span> <span>Google</span>
            <span>Apple</span> <span>Nike</span> <span>HBO</span> <span>NFL</span> <span>Sprite</span> <span>Disney</span> <span>Netflix</span> <span>Google</span>
        </div>
    </div>

</body>
</html>
