<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster | Silk Ivory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Founders+Grotesk+X-Condensed:wght@600&display=swap" rel="stylesheet">
    <style>
        /* RESET & CORE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; color: #000; font-family: 'DM Mono', monospace; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* NAVIGATION */
        nav { display: flex; justify-content: space-between; padding: 30px 5%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .logo { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 1.5rem; text-decoration: none; color: #000; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-links a { color: #000; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; margin-left: 25px; letter-spacing: 0.1em; }

        header { padding: 80px 5% 40px; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: clamp(4rem, 10vw, 8rem); text-transform: uppercase; line-height: 0.85; letter-spacing: -0.04em; }

        /* GRID SYSTEM */
        .roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid #eee; background: #000; }
        .artist-card { position: relative; aspect-ratio: 4/5; overflow: hidden; border-right: 1px solid #eee; cursor: pointer; }
        .artist-card:last-child { border-right: none; }
        
        /* IMAGE & HOVER EFFECTS */
        .artist-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1); opacity: 0.85; }
        .artist-card:hover img { transform: scale(1.06); filter: grayscale(0%); opacity: 1; }

        /* TEXT OVERLAY (PC HOVER) */
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 60%); 
            display: flex; 
            align-items: flex-end; 
            padding: 30px; 
            opacity: 0; 
            transition: opacity 0.4s ease; 
            z-index: 10; /* Ensures text is on top */
        }
        .artist-card:hover .overlay { opacity: 1; }
        .overlay h2 { color: #ffffff !important; font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 4.5rem; text-transform: uppercase; line-height: 0.85; pointer-events: none; }

        /* MOBILE VIEW */
        .mobile-label { display: none; padding: 20px 5%; font-family: 'Founders Grotesk X-Condensed', sans-serif; font-size: 2.5rem; text-transform: uppercase; border-bottom: 1px solid #eee; color: #000; background: #fff; }

        /* DRAWER / SPEC SHEET */
        .drawer { position: fixed; top: 0; right: -100%; width: 500px; height: 100%; background: #fff; z-index: 2000; box-shadow: -10px 0 50px rgba(0,0,0,0.1); transition: right 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); padding: 100px 50px; overflow-y: auto; }
        .drawer.active { right: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: 0.5s; z-index: 1999; backdrop-filter: blur(8px); }
        .drawer-overlay.active { opacity: 1; visibility: visible; }
